<!DOCTYPE html>
<html>
<head>
    <title>AI Tool Repository</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>AI Tool Recommender</h1>
    <div class="search-box">
        <input type="text" id="userInput" placeholder="e.g., I want to create a logo">
        <button onclick="findTools()">Suggest Tools</button>
    </div>
    <div id="results" class="results-grid"></div>

    <script src="script.js"></script>


    <div class="add-section">
        <h2>Contribute to the Repo</h2>
        <input type="text" id="addName" placeholder="Tool Name">
        <input type="text" id="addCat" placeholder="Category (e.g. Design)">
        <input type="text" id="addDesc" placeholder="Brief Description">
        <input type="text" id="addUrl" placeholder="https://...">
        <input type="text" id="addTags" placeholder="Tags (comma separated: logo, icon, ai)">
        <button onclick="addNewTool()">Submit Tool</button>
    </div>
    
</body>
</html>
