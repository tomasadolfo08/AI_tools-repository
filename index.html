<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tool Registry | Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<header id="mainHeader">
    <div class="container">
        <h1>AI Tool Repository</h1>
        <p>Find the perfect artificial intelligence tools for your project</p>

        <div class="search-container">
            <div class="custom-multiselect" id="categoryDropdown">
                <div class="select-box">
                    <span id="selectedCount">All Categories</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="options-container" id="categoryOptions">
                    <label><input type="checkbox" value="Writing & Content"> Writing & Content</label>
                    <label><input type="checkbox" value="Image & Art"> Image & Art</label>
                    <label><input type="checkbox" value="Video & Motion"> Video & Motion</label>
                    <label><input type="checkbox" value="Audio & Voice"> Audio & Voice</label>
                    <label><input type="checkbox" value="Code & Dev"> Code & Dev</label>
                    <label><input type="checkbox" value="Business & Productivity"> Business & Productivity</label>
                    <label><input type="checkbox" value="Marketing & Social"> Marketing & Social</label>
                    <label><input type="checkbox" value="Chatbots & Agents"> Chatbots & Agents</label>
                    <label><input type="checkbox" value="Research & Education"> Research & Education</label>
                    <label><input type="checkbox" value="Life & Fun"> Life & Fun</label>
                </div>
            </div>

            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Search...">
                <div id="suggestions" class="suggestions-box"></div>
            </div>

            <select id="priceFilter">
                <option value="all">All Prices</option>
                <option value="Free">Free</option>
                <option value="Freemium">Freemium</option>
                <option value="Paid">Paid</option>
            </select>

            <button id="searchBtn">Search</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>
</header>

<main class="container">
    <div id="results" class="results-grid">
        </div>

    <hr class="section-divider">

    <section class="add-section">
        <h2>Add Tool</h2>
        <div class="form-container">
            <div class="input-row">
                <input id="addName" type="text" placeholder="Tool Name">
                <select id="addCat">
                    <option value="">Select Category</option>
                    <option value="Writing & Content">Writing & Content</option>
                    <option value="Image & Art">Image & Art</option>
                    <option value="Video & Motion">Video & Motion</option>
                    <option value="Audio & Voice">Audio & Voice</option>
                    <option value="Code & Dev">Code & Dev</option>
                    <option value="Business & Productivity">Business & Productivity</option>
                    <option value="Marketing & Social">Marketing & Social</option>
                    <option value="Chatbots & Agents">Chatbots & Agents</option>
                    <option value="Research & Education">Research & Education</option>
                    <option value="Life & Fun">Life & Fun</option>
                </select>
            </div>

            <input id="addUrl" type="text" placeholder="URL (https://...)">
            <input id="addTags" type="text" placeholder="Tags (comma separated)">
            <input id="addLang" type="text" placeholder="Languages (comma separated)">

            <select id="addPayment">
                <option value="Free">Free</option>
                <option value="Freemium">Freemium</option>
                <option value="Paid">Paid</option>
            </select>

            <textarea id="addDesc" placeholder="Description"></textarea>
            <button class="btn-submit" id="addToolBtn">Add Tool</button>
        </div>
    </section>
</main>

<footer>
    <div class="container">
        <p>AI Tool Repository</p>
    </div>
</footer>

<button id="topBtn">↑</button>

<script src="script.js"></script>
</body>
</html>
