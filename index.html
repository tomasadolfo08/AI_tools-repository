<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tool Registry | Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container">
        <h1>AI Tool Repository</h1>
        <p>Find the perfect artificial intelligence tools for your project</p>

        <div class="search-container">

            <!-- ✅ SELECT STYLE MULTI DROPDOWN -->
            <div class="select-dropdown">
                <div class="select-btn" id="categoryBtn">All Categories</div>

                <div class="select-menu" id="categoryMenu">
                    <label><input type="checkbox" value="all" checked> All Categories</label>
                    <label><input type="checkbox" value="Writing & Content"> Writing & Content</label>
                    <label><input type="checkbox" value="Image & Art"> Image & Art</label>
                    <label><input type="checkbox" value="Video & Motion"> Video & Motion</label>
                    <label><input type="checkbox" value="Audio & Voice"> Audio & Voice</label>
                    <label><input type="checkbox" value="Code & Dev"> Code & Dev</label>
                    <label><input type="checkbox" value="Business & Productivity"> Business & Productivity</label>
                    <label><input type="checkbox" value="Marketing & Social"> Marketing & Social</label>
                    <label><input type="checkbox" value="Chatbots & Agents"> Chatbots & Agents</label>
                    <label><input type="checkbox" value="Research & Education"> Research & Education</label>
                    <label><input type="checkbox" value="Life & Fun"> Life & Fun</label>
                </div>
            </div>

            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Search...">
                <div id="suggestions" class="suggestions-box"></div>
            </div>

            <select id="priceFilter">
                <option value="all">All Prices</option>
                <option value="Free">Free</option>
                <option value="Freemium">Freemium</option>
                <option value="Paid">Paid</option>
            </select>

            <button id="searchBtn">Search</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>
</header>

<main class="container">
    <div id="results" class="results-grid"></div>
</main>

<script src="script.js"></script>
</body>
</html>
